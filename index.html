<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 카카오맵 검색 서비스</title>
    <style>
        /* 기본 여백 초기화 및 화면 전체 크기 사용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* [핵심] 왼쪽(검색)과 오른쪽(지도)을 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 검색 영역 스타일 */
        .search-panel {
            width: 350px; /* 검색창 영역 너비 고정 */
            height: 100%;
            background-color: #f7f7f7;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10; /* 지도 위에 명확히 보이도록 */
        }

        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #fee500; /* 카카오 시그니처 옐로우 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background-color: #fada0a;
        }

        /* 검색 결과 리스트가 나오는 곳 (스크롤 가능하게) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .result-item {
            padding: 15px;
            background-color: white;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }

        .result-item h5 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .result-item p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 스타일 */
        .map-area {
            flex: 1; /* 남은 화면 전체를 지도가 차지 */
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽: 검색 및 결과창 -->
        <div class="search-panel">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요 (예: 강남역)">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <!-- 검색 결과가 여기에 추가됩니다 -->
            <ul id="placesList" class="result-list"></ul>
        </div>

        <!-- 오른쪽: 지도 표시 -->
        <div id="map" class="map-area"></div>
    </div>

    <!-- 카카오맵 JavaScript API 스크립트 ( autoload=false 로 로딩 오류 방지 ) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=37dc609e2343657a26ee7579358539e1&libraries=services&autoload=false"></script>
    <script>
        // 전역 변수로 지도와 검색 객체 선언
        let map;
        let ps;
        let markers = []; // 생성된 마커들을 담을 배열

        // [핵심] 지도가 안전하게 로드된 후에 실행되도록 kakao.maps.load 사용
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 거부 시 보여줄 기본 중심 좌표 (서울시청)
                level: 5 // 요청하신 지도 확대 레벨 5
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOption);
            
            // 장소 검색 객체 생성
            ps = new kakao.maps.services.Places();

            // HTML5의 Geolocation으로 현재 위치 가져오기 (위치 권한 허용 필요)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const locPosition = new kakao.maps.LatLng(lat, lon); // 내 위치 좌표 생성
                    
                    // 지도 중심을 현재 위치로 이동시킵니다.
                    map.setCenter(locPosition);
                    
                    // 현재 위치에 마커를 하나 생성합니다.
                    const currentMarker = new kakao.maps.Marker({
                        position: locPosition,
                        map: map
                    });
                    
                }, function(error) {
                    console.log("위치 권한을 획득하지 못했습니다.", error);
                });
            }
        });

        // 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            // 카카오맵 검색 객체를 통해 키word로 장소검색을 요청합니다
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 장소검색이 완료됐을 때 호출되는 콜백함수 입니다
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면 검색 목록과 마커를 표출합니다
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과 목록과 마커를 표출하는 함수입니다
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 기존에 있던 검색 결과와 마커를 모두 지웁니다
            listEl.innerHTML = '';
            removeMarker();

            for (let i = 0; i < places.length; i++) {
                // 마커를 생성하고 지도에 표시합니다
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                markers.push(marker); // 지우기 위해 배열에 저장

                // 왼쪽 리스트에 아이템 추가
                const itemEl = document.createElement('li');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                `;
                
                // 검색된 장소 위치를 기준으로 지도 범위를 재설정하기 위해 bounds 객체에 좌표를 추가합니다
                bounds.extend(placePosition);
                listEl.appendChild(itemEl);
            }

            // 검색된 장소들이 모두 보이도록 지도 중심과 확대 레벨을 자동으로 변경합니다
            map.setBounds(bounds);
        }

        // 지도 위에 표시되고 있는 마커를 모두 제거하는 함수입니다
        function removeMarker() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }   
            markers = [];
        }
    </script>
</body>
</html>
